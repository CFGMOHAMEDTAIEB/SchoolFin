# codespell configuration (French)
#
# Run:
#   python -m codespell . --config=codespell.cfg

# Focus on French only.
[codespell]
language = fr
# Don't scan vendored/build output
skip = build,dist,*.min.js,*.lock,*.png,*.jpg,*.jpeg,*.gif,*.svg,*.pdf
# Avoid failing CI-like usage because of generated artifacts
ignore_regexp = \b(GUI|PyQt|Qt|matplotlib|numpy)\b
